<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bank UI Cards</title>
  <style>
    :root {
      --bg: #e8e8e8;
      --card: #191919;
      --card-2: #222222;
      --text: #f5f5f5;
      --muted: rgba(245, 245, 245, 0.55);
      --neon: #c8ff1a;
      --orange: #ff6a1a;
      --orange-deep: #d44d08;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .board {
      width: min(980px, 100%);
      display: grid;
      gap: 28px;
    }

    .top-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 28px;
    }

    .card {
      position: relative;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .small-card {
      height: 260px;
      background:
        radial-gradient(circle at 50% 20%, rgba(200, 255, 26, 0.14), transparent 30%),
        linear-gradient(180deg, #1d1d1d 0%, #121212 100%);
      padding: 22px;
    }

    .small-card::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 28px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
      pointer-events: none;
    }

    .label {
      font-size: 14px;
      letter-spacing: 0.02em;
      color: rgba(255,255,255,0.75);
      text-transform: uppercase;
    }

    .chart {
      position: absolute;
      left: 16px;
      right: 16px;
      top: 72px;
      height: 120px;
    }

    .chart svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .metric {
      position: absolute;
      left: 22px;
      bottom: 22px;
    }

    .metric .status {
      color: rgba(200, 255, 26, 0.75);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .metric .value {
      font-size: clamp(42px, 7vw, 64px);
      font-weight: 700;
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    .pill {
      position: absolute;
      right: 20px;
      bottom: 20px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(200, 255, 26, 0.12);
      color: rgba(200, 255, 26, 0.9);
      font-size: 12px;
      backdrop-filter: blur(10px);
    }

    .performance {
      background:
        radial-gradient(circle at 75% 18%, rgba(200, 255, 26, 0.16), transparent 22%),
        linear-gradient(180deg, #212121 0%, #161616 100%);
      padding: 22px;
      border: 8px solid rgba(255,255,255,0.03);
    }

    .performance .sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .trend {
      position: absolute;
      top: 22px;
      right: 22px;
      color: var(--neon);
      font-size: 30px;
      line-height: 1;
      font-weight: 700;
      transform: rotate(0deg);
    }

    .performance .value {
      position: absolute;
      left: 22px;
      bottom: 44px;
      font-size: clamp(70px, 10vw, 104px);
      font-weight: 700;
      color: var(--neon);
      line-height: 1;
      letter-spacing: -0.06em;
    }

    .performance .caption {
      position: absolute;
      left: 24px;
      bottom: 24px;
      font-size: 13px;
      color: rgba(255,255,255,0.42);
    }

    .big-card {
      min-height: 280px;
      background: linear-gradient(135deg, #241613 0%, #1a0f0d 50%, #201210 100%);
      display: grid;
      grid-template-columns: 1.05fr 1.4fr;
      padding: 0;
    }

    .wallet {
      background: linear-gradient(180deg, #ff6f25 0%, #ff5f13 45%, #ef5410 100%);
      margin: 18px;
      border-radius: 22px;
      position: relative;
      overflow: hidden;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.15),
        inset 0 -20px 40px rgba(0,0,0,0.12);
      min-height: 244px;
    }

    .wallet::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 80% 18%, rgba(255,255,255,0.2), transparent 18%),
        radial-gradient(circle at 20% 80%, rgba(0,0,0,0.08), transparent 18%);
    }

    .wallet .mini-label {
      position: absolute;
      top: 18px;
      left: 18px;
      font-size: 13px;
      color: rgba(255,255,255,0.65);
    }

    .toggle {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 22px;
      border-radius: 999px;
      background: rgba(255,255,255,0.22);
    }

    .toggle::after {
      content: "";
      position: absolute;
      top: 3px;
      right: 3px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(255,255,255,0.85);
    }

    .wallet .bank {
      position: absolute;
      left: 16px;
      bottom: 14px;
      font-size: clamp(54px, 8vw, 88px);
      font-weight: 700;
      letter-spacing: -0.08em;
      color: rgba(0,0,0,0.14);
      text-shadow: 0 1px 0 rgba(255,255,255,0.18);
    }

    .big-copy {
      padding: 34px 32px 30px 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .big-copy .eyebrow {
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      margin-bottom: 14px;
    }

    .big-copy h1 {
      margin: 0;
      font-size: clamp(28px, 4.2vw, 52px);
      line-height: 0.98;
      letter-spacing: -0.06em;
      font-weight: 500;
      max-width: 11ch;
    }

    .big-copy p {
      margin: 18px 0 0;
      color: rgba(255,255,255,0.45);
      font-size: 14px;
      line-height: 1.45;
      max-width: 24ch;
    }

    @media (max-width: 820px) {
      .top-grid,
      .big-card {
        grid-template-columns: 1fr;
      }

      .big-copy {
        padding: 0 26px 30px 26px;
      }

      .wallet {
        min-height: 220px;
      }
    }
  </style>
</head>
<body>
  <main class="board">
    <section class="top-grid">
      <article class="card small-card">
        <div class="label">Balance</div>

        <div class="chart" aria-hidden="true">
          <svg viewBox="0 0 420 160" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 118 C70 40, 115 136, 170 90 S280 30, 324 76 S380 48, 402 18"
                  stroke="#a8f000" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.16"/>
            <path d="M18 118 C70 40, 115 136, 170 90 S280 30, 324 76 S380 48, 402 18"
                  stroke="#c8ff1a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="219" cy="82" r="11" fill="#191919" stroke="#f2f2f2" stroke-width="4"/>
            <circle cx="219" cy="82" r="4" fill="#c8ff1a"/>
            <rect x="191" y="92" rx="10" ry="10" width="58" height="24" fill="rgba(255,255,255,0.14)"/>
            <text x="220" y="109" text-anchor="middle" fill="white" font-size="14" font-family="Inter, sans-serif">29,856</text>
          </svg>
        </div>

        <div class="metric">
          <div class="status">Increasing</div>
          <div class="value">89%</div>
        </div>

        <div class="pill">Daily</div>
      </article>

      <article class="card small-card performance">
        <div class="label">Performance</div>
        <div class="sub">In the past 7 days</div>
        <div class="trend">↗</div>
        <div class="value">65%</div>
        <div class="caption">Increasing day by day</div>
      </article>
    </section>

    <section class="card big-card">
      <div class="wallet">
        <div class="mini-label">Wallet</div>
        <div class="toggle" aria-hidden="true"></div>
        <div class="bank">Bank</div>
      </div>

      <div class="big-copy">
        <div class="eyebrow">Choose Us!</div>
        <h1>Simplified Banking<br />For Seamless<br />Payments</h1>
        <p>Experience Effortless Banking<br />Designed for Your Convenience</p>
      </div>
    </section>
  </main>
</body>
</html>
